<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2ff801" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Lab Kitchen</title>

  <!-- Tailwind CSS with plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Supabase JS client for draft sync -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Newsreader:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <!-- Tailwind config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-fixed': '#2ff801',
            'tertiary': '#0846ed',
            'on-background': '#2d2f2f',
            'background': '#f6f6f6',
            'surface-white': '#ffffff',
            'outline': '#757777',
            'outline-variant': '#acadad',
          },
          fontFamily: {
            headline: ['"Space Grotesk"', 'sans-serif'],
            body: ['"Newsreader"', 'serif'],
          },
          borderRadius: {
            DEFAULT: '0px',
            none: '0px',
            sm: '0px',
            md: '0px',
            lg: '0px',
            xl: '0px',
            '2xl': '0px',
            '3xl': '0px',
            full: '0px',
          },
        },
      },
    };
  </script>

  <style>
    * { border-radius: 0 !important; }

    .neo-shadow {
      box-shadow: 4px 4px 0px 0px #2d2f2f;
    }

    .scroll-fade {
      position: relative;
      overflow: hidden;
    }
    .scroll-fade::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 48px;
      background: linear-gradient(to right, transparent, #f6f6f6);
      pointer-events: none;
      z-index: 1;
    }
    .scroll-row {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-right: 48px;
    }
    .scroll-row::-webkit-scrollbar { display: none; }

    .hero-gradient {
      background: linear-gradient(to top, rgba(45, 47, 47, 0.85) 0%, rgba(45, 47, 47, 0.4) 50%, transparent 100%);
    }

    /* Recipe content markdown styles */
    .recipe-content h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 3px solid #2d2f2f;
      padding-bottom: 0.25rem;
      margin-top: 1.75rem;
      margin-bottom: 0.75rem;
    }

    .recipe-content h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
      color: #2d2f2f;
    }

    .recipe-content ul {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem 0;
    }

    .recipe-content li {
      font-family: 'Newsreader', serif;
      font-size: 1rem;
      line-height: 1.6;
      padding: 0.35rem 0;
      border-bottom: 1px solid #acadad;
    }

    .recipe-content li:last-child {
      border-bottom: none;
    }

    .recipe-content p {
      font-family: 'Newsreader', serif;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 0.85rem;
      color: #2d2f2f;
    }

    .recipe-content strong {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    .recipe-content ol {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem 0;
      counter-reset: step-counter;
    }

    .recipe-content ol li {
      counter-increment: step-counter;
      font-family: 'Newsreader', serif;
      font-size: 1rem;
      line-height: 1.7;
      padding: 0.5rem 0 0.5rem 2.5rem;
      border-bottom: 1px solid #acadad;
      position: relative;
    }

    .recipe-content ol li::before {
      content: counter(step-counter);
      position: absolute;
      left: 0;
      top: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      color: #2ff801;
      background: #2d2f2f;
      width: 1.75rem;
      height: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
  </style>
</head>

<body class="bg-background min-h-screen font-body text-on-background">

  <!-- Fixed Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-surface-white border-b-4 border-on-background">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <!-- Logo -->
      <a href="#/" class="flex items-center gap-2 no-underline">
        <span class="material-symbols-outlined text-primary-fixed text-3xl" style="font-variation-settings:'FILL' 1,'wght' 700;">biotech</span>
        <span class="font-headline font-black text-3xl uppercase italic tracking-tighter text-on-background leading-none">Lab Kitchen</span>
      </a>

      <div class="flex items-center gap-2">
        <button onclick="location.hash='#/add'" class="font-headline font-bold text-sm border-2 border-on-background w-8 h-8 flex items-center justify-center hover:bg-primary-fixed transition-colors">+</button>
        <a id="back-btn" href="#/" class="hidden font-headline font-bold text-sm uppercase tracking-widest border-2 border-on-background px-3 py-1 text-on-background no-underline hover:bg-on-background hover:text-surface-white transition-colors">
          &larr; Back
        </a>
      </div>
    </div>
  </header>

  <!-- Main content (offset for fixed header) -->
  <main class="pt-14 min-h-screen">
    <div id="app"></div>
  </main>

  <script>
    const REPO = 'mgregor-png/kitchen-lab';
    const BRANCH = 'main';
    const RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

    // ─── Tag pill helper ───────────────────────────────────────────────────────

    // Tag color system - categorized by meaning
    const TAG_CATEGORIES = {
      // Chef / source - black bg, green text
      chef:       { style: 'background:#2d2f2f; color:#2ff801;',
                    tags: ['ottolenghi', 'chatgpt', 'finn-tonry'] },
      // Meal type - green bg, black text
      meal:       { style: 'background:#2ff801; color:#000;',
                    tags: ['meal-prep', 'mains', 'sides', 'salad', 'bowls', 'dessert', 'soup', 'bread', 'pasta', 'grains', 'snack'] },
      // Cuisine - blue bg, white text
      cuisine:    { style: 'background:#0846ed; color:#fff;',
                    tags: ['middle-eastern', 'asian', 'mediterranean', 'mexican', 'italian', 'indian', 'thai', 'japanese', 'french'] },
      // Diet / nutrition - outline
      diet:       { style: 'background:transparent; color:#2d2f2f; border:1px solid #999;',
                    tags: ['high-protein', 'low-cal', 'vegan', 'vegetarian', 'gluten-free', 'dairy-free', 'keto'] },
      // Ingredient / protein - dark gray bg, white text
      ingredient: { style: 'background:#555; color:#fff;',
                    tags: ['chicken', 'meat', 'fish', 'vegetables', 'cheese', 'lamb', 'beef', 'pork', 'seafood', 'tofu', 'eggs'] },
      // Time descriptor - green outline
      time:       { style: 'background:transparent; color:#0f6b00; border:1px solid #2ff801;',
                    tags: ['quick', 'weekend', 'one-pot', 'no-cook'] },
    };

    function tagPillStyle(tag) {
      const t = tag.toLowerCase();
      for (const cat of Object.values(TAG_CATEGORIES)) {
        if (cat.tags.includes(t)) return cat.style;
      }
      // Default - outline
      return 'background:transparent; color:#2d2f2f; border:1px solid #ccc;';
    }

    function renderTagPill(tag, extraClass = '') {
      return `<span class="font-headline font-bold text-xs uppercase tracking-widest px-2 py-0.5 ${extraClass}" style="${tagPillStyle(tag)}">${tag}</span>`;
    }

    // ─── Frontmatter parser ────────────────────────────────────────────────────

    function parseFrontmatter(raw) {
      const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: raw };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const key = line.slice(0, idx).trim();
        const val = line.slice(idx + 1).trim();
        if (val.startsWith('[')) {
          try { meta[key] = JSON.parse(val); } catch { meta[key] = val; }
        } else {
          meta[key] = val.replace(/^["']|["']$/g, '');
        }
      });
      return { meta, body: match[2] };
    }

    // ─── Ingredient parser ─────────────────────────────────────────────────────

    function extractIngredients(body) {
      const match = body.match(/## Ingredients\n([\s\S]*?)(?=\n## |\n$|$)/);
      if (!match) return [];
      return match[1]
        .split('\n')
        .map(l => l.replace(/^[-*]\s*/, '').trim())
        .filter(Boolean);
    }

    function parseIngredient(str) {
      // Try to split "quantity unit name" or "name - quantity"
      const patterns = [
        /^([\d\/\s.,]+(?:g|kg|ml|l|tsp|tbsp|cup|cups|oz|lb|x|pcs|slice|slices|bunch|cloves?|cans?|tins?)\.?)\s+(.+)$/i,
        /^(.+?)\s*[-–]\s*([\d\/\s.,]+.*)$/,
      ];
      for (const re of patterns) {
        const m = str.match(re);
        if (m) return { quantity: m[1].trim(), name: m[2].trim() };
      }
      return { quantity: null, name: str };
    }

    function bodyWithoutIngredients(body) {
      return body.replace(/## Ingredients\n[\s\S]*?(?=\n## |$)/, '').trim();
    }

    // ─── Shopping list localStorage ────────────────────────────────────────────

    function shopKey(slug) { return `kitchen-lab-shop-${slug}`; }
    function loadChecked(slug) {
      try { return JSON.parse(localStorage.getItem(shopKey(slug)) || '[]'); } catch { return []; }
    }
    function saveChecked(slug, arr) {
      localStorage.setItem(shopKey(slug), JSON.stringify(arr));
    }

    // ─── Router ────────────────────────────────────────────────────────────────

    const backBtn = document.getElementById('back-btn');

    function router() {
      const hash = location.hash || '#/';
      const app = document.getElementById('app');

      const addMatch = hash === '#/add';
      const shopMatch = hash.match(/^#\/recipe\/([^/]+)\/shop$/);
      const detailMatch = hash.match(/^#\/recipe\/([^/]+)$/);

      if (addMatch) {
        backBtn.href = '#/';
        backBtn.classList.remove('hidden');
        renderAddRecipe(app);
      } else if (shopMatch) {
        const slug = shopMatch[1];
        backBtn.href = `#/recipe/${slug}`;
        backBtn.classList.remove('hidden');
        renderShop(slug, app);
      } else if (detailMatch) {
        const slug = detailMatch[1];
        backBtn.href = '#/';
        backBtn.classList.remove('hidden');
        renderDetail(slug, app);
      } else {
        backBtn.classList.add('hidden');
        renderList(app);
      }
    }

    // ─── View: Recipe List ─────────────────────────────────────────────────────

    let allRecipes = null;
    let activeFilters = new Set();
    let activeTimeFilter = null; // null, 'quick', 'medium', 'long'
    let searchQuery = '';

    async function renderList(container) {
      container.innerHTML = '<div class="max-w-2xl mx-auto px-4 py-8 text-center font-headline">Loading...</div>';

      if (!allRecipes) {
        try {
          const res = await fetch(`${RAW}/recipes.json`);
          allRecipes = await res.json();
        } catch (e) {
          container.innerHTML = `<div class="max-w-2xl mx-auto px-4 py-8 text-center font-headline text-red-600">Failed to load recipes.</div>`;
          return;
        }
      }

      // Collect all unique tags
      const allTags = [];
      allRecipes.forEach(r => (r.tags || []).forEach(t => { if (!allTags.includes(t)) allTags.push(t); }));

      // Filter recipes by tags
      let filtered = activeFilters.size === 0
        ? [...allRecipes]
        : allRecipes.filter(r => (r.tags || []).some(t => activeFilters.has(t)));

      // Filter by time
      if (activeTimeFilter === 'quick') filtered = filtered.filter(r => r.time < 30);
      else if (activeTimeFilter === 'medium') filtered = filtered.filter(r => r.time >= 30 && r.time <= 60);
      else if (activeTimeFilter === 'long') filtered = filtered.filter(r => r.time > 60);

      // Filter by search query
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(r =>
          (r.title || '').toLowerCase().includes(q) ||
          (r.description || '').toLowerCase().includes(q) ||
          (r.ingredients || []).some(ing => ing.toLowerCase().includes(q))
        );
      }

      const timeBtn = (label, value, icon) => `
        <button onclick="setTimeFilter('${value}')"
          class="font-headline font-bold text-xs uppercase tracking-widest px-3 py-1 border-2 transition-colors flex items-center gap-1 ${activeTimeFilter === value ? 'bg-primary-fixed text-on-background border-on-background' : 'bg-surface-white text-on-background border-outline-variant hover:border-on-background'}">
          <span class="material-symbols-outlined text-sm">${icon}</span>${label}
        </button>`;

      // Separate chef tags from other tags
      const chefTags = TAG_CATEGORIES.chef.tags.filter(t => allTags.includes(t));
      const nonChefTags = allTags.filter(t => !TAG_CATEGORIES.chef.tags.includes(t));

      const filterBtn = (tag, isActive) => `
        <button
          onclick="toggleFilter('${tag}')"
          class="font-headline font-bold text-xs uppercase tracking-widest px-3 py-1 border-2 border-on-background transition-colors whitespace-nowrap flex-shrink-0 ${isActive ? 'bg-on-background text-surface-white' : 'bg-surface-white text-on-background hover:bg-on-background hover:text-surface-white'}"
        >${tag}</button>`;

      const filterBar = `
        <div class="flex items-center gap-2 mb-3">
          <div class="flex gap-2 flex-1">
            <button onclick="setTimeFilter(null)"
              class="font-headline font-bold text-xs uppercase tracking-widest px-3 py-1 border-2 border-on-background transition-colors whitespace-nowrap ${!activeTimeFilter ? 'bg-on-background text-surface-white' : 'bg-surface-white text-on-background hover:bg-on-background hover:text-surface-white'}">Any</button>
            ${timeBtn('&lt;30', 'quick', 'bolt')}
            ${timeBtn('30-60', 'medium', 'schedule')}
            ${timeBtn('60+', 'long', 'local_fire_department')}
          </div>
          <button onclick="toggleSearchBar()" class="border-2 border-on-background w-10 h-10 flex items-center justify-center flex-shrink-0 hover:bg-primary-fixed transition-colors ${searchQuery ? 'bg-on-background text-surface-white' : 'bg-surface-white text-on-background'}">
            <span class="material-symbols-outlined text-xl">search</span>
          </button>
        </div>
        <div class="mb-3 ${searchQuery ? '' : 'hidden'}" id="search-bar-row">
          <div class="relative">
            <input
              id="search-input"
              type="text"
              value="${searchQuery.replace(/"/g, '&quot;')}"
              placeholder="Search recipes or ingredients..."
              oninput="handleSearch(this.value)"
              class="w-full font-headline text-sm bg-surface-white border-4 border-on-background px-4 py-3 pr-10 placeholder:text-outline-variant focus:outline-none focus:border-primary-fixed"
            />
            <button onclick="clearSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-background">
              <span class="material-symbols-outlined text-xl">close</span>
            </button>
          </div>
        </div>
        <div class="mb-2">
          <div class="scroll-fade">
            <div class="scroll-row">
              <button
                onclick="toggleFilter(null)"
                class="font-headline font-bold text-xs uppercase tracking-widest px-3 py-1 border-2 border-on-background transition-colors whitespace-nowrap flex-shrink-0 ${activeFilters.size === 0 ? 'bg-on-background text-surface-white' : 'bg-surface-white text-on-background hover:bg-on-background hover:text-surface-white'}"
              >ALL</button>
              ${chefTags.map(tag => filterBtn(tag, activeFilters.has(tag))).join('')}
            </div>
          </div>
        </div>
        <div class="mb-4">
          <div class="scroll-fade">
            <div class="scroll-row">
              ${nonChefTags.map(tag => filterBtn(tag, activeFilters.has(tag))).join('')}
            </div>
          </div>
        </div>
      `;

      const resultCount = `
        <div class="font-headline font-bold text-xs uppercase tracking-widest text-outline mb-4">
          ${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}${searchQuery ? ` matching "${searchQuery}"` : ''}
        </div>
      `;

      const cards = filtered.map(recipe => {
        const tags = (recipe.tags || []).map(t => renderTagPill(t, 'inline-block mt-1')).join(' ');
        const imgHtml = recipe.image
          ? `<div class="w-20 h-20 md:w-24 md:h-24 flex-shrink-0 border-r-[3px] border-on-background overflow-hidden">
               <img src="${recipe.image}" alt="${recipe.title}" class="w-full h-full object-cover" loading="lazy" onerror="this.parentElement.style.display='none'">
             </div>`
          : '';
        return `
          <a href="#/recipe/${recipe.slug}" class="block border-4 border-on-background bg-surface-white neo-shadow mb-4 no-underline text-on-background hover:translate-x-[-2px] hover:translate-y-[-2px] transition-transform overflow-hidden">
            <div class="flex items-stretch">
              ${imgHtml}
              <div class="flex-1 p-4 flex items-start justify-between gap-4 min-w-0">
                <div class="flex-1 min-w-0">
                  <div class="font-headline font-black text-xl uppercase leading-tight mb-1">${recipe.title}</div>
                  <div class="font-body italic text-sm text-outline mb-2">${recipe.description || ''}</div>
                  <div class="flex flex-wrap gap-1">${tags}</div>
                </div>
                <div class="border-l-[3px] border-on-background pl-3 min-w-[60px] text-right flex-shrink-0">
                  <div class="font-headline font-black text-3xl leading-none">${recipe.time}</div>
                  <div class="font-headline font-bold text-[10px] uppercase tracking-widest">MIN</div>
                </div>
              </div>
            </div>
          </a>
        `;
      }).join('');

      container.innerHTML = `
        <div class="max-w-2xl mx-auto px-4 py-8">
          ${filterBar}
          ${await renderDraftsSection()}
          ${resultCount}
          ${filtered.length === 0 ? '<div class="font-headline text-outline text-center py-8">No recipes match.</div>' : cards}
        </div>
      `;
    }

    window.toggleFilter = function(tag) {
      if (tag === null) {
        activeFilters.clear();
      } else {
        if (activeFilters.has(tag)) activeFilters.delete(tag);
        else activeFilters.add(tag);
      }
      renderList(document.getElementById('app'));
    };

    window.setTimeFilter = function(value) {
      activeTimeFilter = activeTimeFilter === value ? null : value;
      renderList(document.getElementById('app'));
    };

    let _searchTimeout = null;
    window.handleSearch = function(value) {
      clearTimeout(_searchTimeout);
      _searchTimeout = setTimeout(() => {
        searchQuery = value;
        renderList(document.getElementById('app'));
        // Restore focus and cursor position after re-render
        const input = document.getElementById('search-input');
        if (input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }, 300);
    };

    window.clearSearch = function() {
      searchQuery = '';
      const row = document.getElementById('search-bar-row');
      if (row) row.classList.add('hidden');
      renderList(document.getElementById('app'));
    };

    window.toggleSearchBar = function() {
      const row = document.getElementById('search-bar-row');
      const input = document.getElementById('search-input');
      if (!row) return;
      if (row.classList.contains('hidden')) {
        row.classList.remove('hidden');
        if (input) input.focus();
      } else if (!searchQuery) {
        row.classList.add('hidden');
      }
    };

    // ─── View: Recipe Detail ───────────────────────────────────────────────────

    async function renderDetail(slug, container) {
      container.innerHTML = '<div class="max-w-5xl mx-auto px-4 py-8 text-center font-headline">Loading...</div>';

      // Ensure allRecipes is loaded for image lookup
      if (!allRecipes) {
        try {
          const listRes = await fetch(`${RAW}/recipes.json`);
          allRecipes = await listRes.json();
        } catch { /* image lookup will fall back to meta.image */ }
      }

      let raw;
      try {
        const res = await fetch(`${RAW}/recipes/${slug}.md`);
        if (!res.ok) throw new Error('Not found');
        raw = await res.text();
      } catch {
        container.innerHTML = `<div class="max-w-5xl mx-auto px-4 py-8 text-center font-headline">Recipe not found.</div>`;
        return;
      }

      const { meta, body } = parseFrontmatter(raw);
      const ingredients = extractIngredients(body);
      const mainBody = bodyWithoutIngredients(body);
      const renderedBody = marked.parse(mainBody);

      const title = meta.title || slug;
      const time = meta.time || '';
      const tags = (meta.tags ? (Array.isArray(meta.tags) ? meta.tags : [meta.tags]) : [])
        .map(t => renderTagPill(t, 'inline-block')).join(' ');

      const ingredientRows = ingredients.map(ing => {
        const { quantity, name } = parseIngredient(ing);
        return `
          <div class="flex items-start justify-between gap-2 py-2 border-b border-outline border-opacity-30 last:border-b-0">
            <span class="font-body italic text-surface-white text-sm leading-snug flex-1">${name}</span>
            ${quantity ? `<span class="font-headline font-bold text-primary-fixed text-sm flex-shrink-0">${quantity}</span>` : ''}
          </div>
        `;
      }).join('');

      // Mobile: collapsible ingredients toggle
      const mobileIngBlock = ingredients.length > 0 ? `
        <div class="md:hidden border-b-4 border-on-background">
          <button
            onclick="document.getElementById('mobile-ings').classList.toggle('hidden')"
            class="w-full flex items-center justify-between bg-on-background text-surface-white px-4 py-3 font-headline font-bold text-sm uppercase tracking-widest"
          >
            <span>Ingredients (${ingredients.length})</span>
            <span class="material-symbols-outlined text-base">expand_more</span>
          </button>
          <div id="mobile-ings" class="hidden bg-on-background px-4 pb-4">
            ${ingredientRows}
            <a href="#/recipe/${slug}/shop" class="block mt-4 text-center bg-primary-fixed text-on-background font-headline font-bold text-sm uppercase tracking-widest border-4 border-on-background px-4 py-2 neo-shadow">
              Shopping List
            </a>
          </div>
        </div>
      ` : '';

      // Look up image from allRecipes cache (avoid re-fetching)
      const recipeData = allRecipes ? allRecipes.find(r => r.slug === slug) : null;
      const imageUrl = recipeData?.image || meta.image || '';

      const heroHtml = imageUrl ? `
        <div class="relative w-full h-[250px] md:h-[400px] border-b-4 border-on-background overflow-hidden" id="hero-container">
          <img
            src="${imageUrl}"
            alt="${title}"
            class="w-full h-full object-cover"
            style="border: 2px solid #2d2f2f;"
            onerror="document.getElementById('hero-container').style.display='none'; document.getElementById('fallback-title').classList.remove('hidden');"
          />
          <div class="hero-gradient absolute inset-0 flex flex-col justify-end p-6 md:p-10">
            <h1 class="font-headline font-black text-3xl md:text-5xl uppercase leading-tight text-white mb-2">${title}</h1>
            <div class="flex flex-wrap items-center gap-3">
              ${time ? `<span class="font-headline font-black text-white"><span class="text-2xl">${time}</span> <span class="text-xs font-bold uppercase tracking-widest">MIN</span></span>` : ''}
              ${tags}
            </div>
          </div>
        </div>
      ` : '';

      const fallbackTitle = `
        <div id="fallback-title" class="${imageUrl ? 'hidden' : ''} p-6 md:p-10 bg-surface-white">
          <h1 class="font-headline font-black text-3xl md:text-4xl uppercase leading-tight mb-3">${title}</h1>
          <div class="flex flex-wrap items-center gap-3">
            ${time ? `<span class="font-headline font-black text-on-background"><span class="text-2xl">${time}</span> <span class="text-xs font-bold uppercase tracking-widest">MIN</span></span>` : ''}
            ${tags}
          </div>
        </div>
      `;

      container.innerHTML = `
        ${heroHtml}
        ${mobileIngBlock}
        <div class="max-w-5xl mx-auto md:grid md:grid-cols-12 min-h-[calc(100vh-3.5rem)]">
          <!-- Left sidebar: ingredients (desktop only) -->
          ${ingredients.length > 0 ? `
          <div class="hidden md:block md:col-span-4 bg-on-background text-surface-white p-6 border-r-4 border-on-background sticky top-14 h-[calc(100vh-3.5rem)] overflow-y-auto">
            <div class="font-headline font-black text-xs uppercase tracking-widest text-primary-fixed mb-4">Ingredients</div>
            ${ingredientRows}
            <a href="#/recipe/${slug}/shop" class="block mt-6 text-center bg-primary-fixed text-on-background font-headline font-bold text-sm uppercase tracking-widest border-4 border-black px-4 py-3 neo-shadow">
              Shopping List
            </a>
          </div>
          ` : ''}

          <!-- Right main: recipe body -->
          <div class="${ingredients.length > 0 ? 'md:col-span-8' : 'md:col-span-12'} bg-surface-white p-6 md:p-10">
            ${!imageUrl ? fallbackTitle : ''}
            <div class="recipe-content">${renderedBody}</div>
          </div>
        </div>
      `;
    }

    // ─── View: Shopping List ───────────────────────────────────────────────────

    async function renderShop(slug, container) {
      container.innerHTML = '<div class="max-w-2xl mx-auto px-4 py-8 text-center font-headline">Loading...</div>';

      let raw;
      try {
        const res = await fetch(`${RAW}/recipes/${slug}.md`);
        if (!res.ok) throw new Error('Not found');
        raw = await res.text();
      } catch {
        container.innerHTML = `<div class="max-w-2xl mx-auto px-4 py-8 text-center font-headline">Recipe not found.</div>`;
        return;
      }

      const { meta, body } = parseFrontmatter(raw);
      const ingredients = extractIngredients(body);
      const title = meta.title || slug;

      if (ingredients.length === 0) {
        container.innerHTML = `<div class="max-w-2xl mx-auto px-4 py-8 font-headline text-center">No ingredients found.</div>`;
        return;
      }

      renderShopView(slug, title, ingredients, container);
    }

    // --- Shopping rules engine ---

    const PANTRY_STAPLES = [
      'olive oil', 'salt', 'pepper', 'black pepper', 'sea salt',
      'paprika', 'cumin', 'oregano', 'chili', 'chilli', 'chili powder',
      'garlic', 'dried spices', 'flaky sea salt', 'kosher salt',
      'ground cumin', 'ground coriander', 'ground cinnamon', 'ground turmeric',
      'vegetable oil', 'sunflower oil', 'neutral oil', 'rapeseed oil',
    ];

    const MAKE_AT_HOME = [
      'pickled red onion', 'pickled red onions', 'pickled onion', 'pickled onions',
      'pickled vegetables', 'quick-pickled',
    ];

    const SPICE_MIX_BREAKDOWNS = {
      'taco seasoning': ['cumin', 'chili powder', 'paprika', 'garlic powder', 'onion powder', 'oregano'],
      'gyros seasoning': ['paprika', 'cumin', 'oregano', 'garlic powder', 'onion powder', 'coriander'],
      'fajita seasoning': ['cumin', 'paprika', 'chili powder', 'garlic powder', 'onion powder', 'oregano'],
    };

    function classifyIngredient(ingredientStr) {
      const lower = ingredientStr.toLowerCase();
      for (const term of MAKE_AT_HOME) {
        if (lower.includes(term)) return { category: 'make-at-home', label: 'MAKE AT HOME' };
      }
      for (const [mix, components] of Object.entries(SPICE_MIX_BREAKDOWNS)) {
        if (lower.includes(mix)) return { category: 'spice-mix', label: mix.toUpperCase(), components };
      }
      for (const staple of PANTRY_STAPLES) {
        if (lower.includes(staple) || staple.includes(lower.replace(/s$/, ''))) return { category: 'pantry', label: 'PANTRY' };
      }
      return { category: 'buy', label: null };
    }

    function renderShopView(slug, title, ingredients, container) {
      const checked = loadChecked(slug);

      const classified = [];
      ingredients.forEach((ing, i) => {
        const cls = classifyIngredient(ing);
        if (cls.category === 'spice-mix') {
          classified.push({ ing, i, ...cls, isHeader: true });
          cls.components.forEach((comp, ci) => {
            classified.push({ ing: comp, i: `mix-${i}-${ci}`, category: 'buy', label: null, isHeader: false });
          });
        } else {
          classified.push({ ing, i, ...cls, isHeader: false });
        }
      });

      const items = classified.map(item => {
        if (item.isHeader) {
          return `
            <div class="font-headline font-bold text-xs uppercase tracking-widest text-outline mt-6 mb-2 flex items-center gap-2">
              <span class="material-symbols-outlined text-sm">blender</span>
              ${item.ing}
              <span class="font-headline font-bold text-[10px] uppercase tracking-widest px-2 py-0.5 bg-primary-fixed text-on-background">${item.label}</span>
            </div>
          `;
        }

        const idx = item.i;
        const isChecked = typeof idx === 'number' && checked.includes(idx);
        const isPantry = item.category === 'pantry';
        const isMakeAtHome = item.category === 'make-at-home';
        const isAutoSkipped = isPantry || isMakeAtHome;

        let bgClass = 'bg-surface-white neo-shadow';
        let textClass = '';
        if (isChecked) { bgClass = 'opacity-40 bg-background'; textClass = 'line-through text-outline'; }
        else if (isPantry) { bgClass = 'bg-background'; textClass = 'text-outline'; }
        else if (isMakeAtHome) { bgClass = 'bg-background'; textClass = 'line-through text-outline'; }

        const chip = item.label
          ? `<span data-category="${item.category}" class="font-headline font-bold text-[10px] uppercase tracking-widest px-2 py-0.5 flex-shrink-0 ${
              isMakeAtHome ? 'bg-primary-fixed text-on-background' : 'bg-outline-variant text-surface-white'
            }">${item.label}</span>`
          : '';

        const onclickAttr = typeof idx === 'number'
          ? `onclick="toggleShopItem('${slug}', ${idx})"`
          : '';

        return `
          <label class="flex items-center gap-3 p-4 border-4 ${isAutoSkipped && !isChecked ? 'border-outline-variant' : 'border-on-background'} mb-3 cursor-pointer select-none transition-all ${bgClass}" ${onclickAttr}>
            <div class="w-6 h-6 border-2 border-on-background flex items-center justify-center flex-shrink-0 ${isChecked ? 'bg-on-background' : 'bg-surface-white'}">
              ${isChecked ? '<span class="material-symbols-outlined text-surface-white text-base">check</span>' : ''}
            </div>
            <span class="font-body text-base flex-1 ${textClass}">${item.ing}</span>
            ${chip}
          </label>
        `;
      }).join('');

      container.innerHTML = `
        <div class="max-w-2xl mx-auto px-4 py-8">
          <div class="mb-6">
            <div class="font-headline font-bold text-xs uppercase tracking-widest text-outline mb-1">Shopping List</div>
            <h1 class="font-headline font-black text-2xl uppercase">${title}</h1>
          </div>

          <div class="flex flex-col gap-3 mb-6">
            <div class="flex gap-3">
              <button
                id="copy-rohlik-btn"
                onclick="copyForRohlik('${slug}')"
                class="flex-1 bg-primary-fixed text-on-background font-headline font-bold text-sm uppercase tracking-widest border-4 border-on-background px-4 py-3 neo-shadow hover:opacity-80 transition-opacity flex items-center justify-center gap-2"
              ><span class="material-symbols-outlined text-base">content_copy</span>Copy for Rohlik</button>
              <button
                onclick="resetShop('${slug}')"
                class="bg-surface-white text-on-background font-headline font-bold text-sm uppercase tracking-widest border-4 border-on-background px-4 py-3 neo-shadow hover:bg-background transition-colors"
              >Reset</button>
            </div>
            <button
              id="copy-claude-btn"
              onclick="copyForClaude('${slug}')"
              class="w-full bg-on-background text-surface-white font-headline font-bold text-sm uppercase tracking-widest border-4 border-on-background px-4 py-3 neo-shadow hover:opacity-80 transition-opacity flex items-center justify-center gap-2"
            ><span class="material-symbols-outlined text-base">smart_toy</span>Send to Claude</button>
          </div>

          <div id="shop-items">
            ${items}
          </div>
        </div>
      `;
    }

    window._shopState = {};

    window.toggleShopItem = function(slug, idx) {
      const checked = loadChecked(slug);
      const pos = checked.indexOf(idx);
      if (pos === -1) checked.push(idx);
      else checked.splice(pos, 1);
      saveChecked(slug, checked);

      // Re-render shop view — need recipe data
      const container = document.getElementById('app');
      renderShop(slug, container);
    };

    window.copyForRohlik = async function(slug) {
      const checked = loadChecked(slug);
      const labels = document.querySelectorAll('#shop-items label');
      const lines = [];
      labels.forEach(label => {
        const onclick = label.getAttribute('onclick') || '';
        const m = onclick.match(/toggleShopItem\('[^']+',\s*(\d+)\)/);
        if (!m) return;
        const i = parseInt(m[1]);
        if (checked.includes(i)) return;
        // Skip items with a category chip (pantry / make-at-home)
        if (label.querySelector('[data-category]')) return;
        const span = label.querySelector('span.font-body');
        if (span) lines.push(span.textContent.trim());
      });
      await clipboardCopy(lines.join('\n'));
      flashButton('copy-rohlik-btn', 'Copied!');
    };

    window.copyForClaude = async function(slug) {
      const titleEl = document.querySelector('#app h1');
      const title = titleEl ? titleEl.textContent.trim() : slug;
      const labels = document.querySelectorAll('#shop-items label');
      const ings = [];
      labels.forEach(label => {
        const onclick = label.getAttribute('onclick') || '';
        const m = onclick.match(/toggleShopItem\('[^']+',\s*(\d+)\)/);
        if (!m) return;
        const span = label.querySelector('span.font-body');
        if (span) ings.push(span.textContent.trim());
      });
      const prompt = `Create a Rohlik shopping list for: ${title}\n\nIngredients:\n${ings.map(i => `- ${i}`).join('\n')}\n\nCheck product-preferences.md and shopping-rules.md.`;
      await clipboardCopy(prompt);
      flashButton('copy-claude-btn', 'Copied!');
    };

    async function clipboardCopy(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
    }

    function flashButton(btnId, msg) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      const orig = btn.innerHTML;
      btn.textContent = msg;
      btn.style.background = '#2ff801';
      btn.style.color = '#000';
      setTimeout(() => {
        btn.innerHTML = orig;
        btn.style.background = '';
        btn.style.color = '';
      }, 1500);
    }

    window.resetShop = function(slug) {
      localStorage.removeItem(shopKey(slug));
      renderShop(slug, document.getElementById('app'));
    };

    // --- Draft system (Supabase) ---

    const SUPABASE_URL = 'https://bpbendglpbyydhwbpehq.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_d9VhtNS7tpDE38x2d8_HjQ_Yg1bRY3f';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const DRAFTS_LOCAL_KEY = 'kitchen-lab-drafts-offline';

    async function loadDrafts() {
      try {
        // Try Supabase first
        const { data, error } = await sb.from('drafts').select('*').order('created_at', { ascending: true });
        if (error) throw error;
        // Map Supabase fields to app fields
        const remote = (data || []).map(d => ({ ...d, createdAt: d.created_at, source: 'remote' }));
        // Also include any offline drafts
        const local = loadLocalDrafts().map(d => ({ ...d, source: 'offline' }));
        return [...local, ...remote];
      } catch {
        // Offline - return localStorage drafts only
        return loadLocalDrafts().map(d => ({ ...d, source: 'offline' }));
      }
    }

    async function saveDraft(draft) {
      try {
        const { error } = await sb.from('drafts').insert({ type: draft.type, content: draft.content });
        if (error) throw error;
        // If we have offline drafts, try to sync them too
        await syncOfflineDrafts();
      } catch {
        // Offline fallback - save to localStorage
        const drafts = loadLocalDrafts();
        drafts.push({ ...draft, id: Date.now(), createdAt: new Date().toISOString() });
        localStorage.setItem(DRAFTS_LOCAL_KEY, JSON.stringify(drafts));
        return 'offline';
      }
    }

    async function deleteDraft(id) {
      try {
        // UUID = Supabase, number = local
        if (typeof id === 'string' && id.includes('-')) {
          const { error } = await sb.from('drafts').delete().eq('id', id);
          if (error) throw error;
        } else {
          const drafts = loadLocalDrafts().filter(d => d.id !== id);
          localStorage.setItem(DRAFTS_LOCAL_KEY, JSON.stringify(drafts));
        }
      } catch {
        // Silently fail - draft stays, user can retry
      }
    }

    function loadLocalDrafts() {
      try { return JSON.parse(localStorage.getItem(DRAFTS_LOCAL_KEY) || '[]'); } catch { return []; }
    }

    async function syncOfflineDrafts() {
      const local = loadLocalDrafts();
      if (local.length === 0) return;
      const synced = [];
      for (const d of local) {
        try {
          const { error } = await sb.from('drafts').insert({ type: d.type, content: d.content });
          if (!error) synced.push(d.id);
        } catch { /* skip, will retry next time */ }
      }
      if (synced.length > 0) {
        const remaining = local.filter(d => !synced.includes(d.id));
        localStorage.setItem(DRAFTS_LOCAL_KEY, JSON.stringify(remaining));
      }
    }

    async function renderDraftsSection() {
      const drafts = await loadDrafts();
      if (drafts.length === 0) return '';
      const items = drafts.map(d => {
        const icon = d.type === 'url' ? 'link' : d.type === 'photo' ? 'photo_camera' : 'notes';
        const preview = d.type === 'url' ? d.content : d.type === 'text' ? d.content.slice(0, 80) + '...' : 'Photo';
        const date = new Date(d.createdAt).toLocaleDateString();
        const offlineChip = d.source === 'offline' ? '<span class="font-headline font-bold text-[10px] uppercase tracking-widest px-2 py-0.5 bg-outline-variant text-surface-white">offline</span>' : '';
        return `
          <div class="flex items-center gap-3 p-3 border-4 border-dashed border-outline-variant mb-2 bg-surface-white">
            <span class="material-symbols-outlined text-outline">${icon}</span>
            <span class="font-body text-sm flex-1 truncate">${preview}</span>
            ${offlineChip}
            <span class="font-headline text-[10px] uppercase tracking-widest text-outline">${date}</span>
            <button onclick="event.stopPropagation(); deleteDraftAndRefresh('${d.id}')" class="text-outline hover:text-on-background">
              <span class="material-symbols-outlined text-sm">close</span>
            </button>
          </div>
        `;
      }).join('');
      return `
        <div class="mb-6 p-4 border-4 border-on-background bg-background">
          <div class="font-headline font-bold text-xs uppercase tracking-widest text-outline mb-3">
            <span class="material-symbols-outlined text-sm align-middle">edit_note</span>
            Drafts (${drafts.length})
          </div>
          ${items}
        </div>
      `;
    }

    window.deleteDraftAndRefresh = async function(id) {
      await deleteDraft(id);
      renderList(document.getElementById('app'));
    };

    function renderAddRecipe(container) {
      container.innerHTML = `
        <div class="max-w-2xl mx-auto px-4 py-8">
          <h1 class="font-headline font-black text-2xl uppercase mb-6">Add Recipe</h1>

          <div class="flex gap-2 mb-6">
            <button onclick="switchAddTab('url')" id="tab-url" class="flex-1 font-headline font-bold text-xs uppercase tracking-widest px-3 py-2 border-4 border-on-background bg-on-background text-surface-white">URL</button>
            <button onclick="switchAddTab('text')" id="tab-text" class="flex-1 font-headline font-bold text-xs uppercase tracking-widest px-3 py-2 border-4 border-on-background bg-surface-white text-on-background">Text</button>
            <button onclick="switchAddTab('photo')" id="tab-photo" class="flex-1 font-headline font-bold text-xs uppercase tracking-widest px-3 py-2 border-4 border-on-background bg-surface-white text-on-background">Photo</button>
          </div>

          <div id="add-form-url">
            <input id="draft-url" type="url" placeholder="Paste Instagram or recipe URL..." class="w-full font-headline text-sm bg-surface-white border-4 border-on-background px-4 py-3 placeholder:text-outline-variant focus:outline-none focus:border-primary-fixed mb-4" />
          </div>

          <div id="add-form-text" class="hidden">
            <textarea id="draft-text" rows="8" placeholder="Paste or type the recipe..." class="w-full font-body text-sm bg-surface-white border-4 border-on-background px-4 py-3 placeholder:text-outline-variant focus:outline-none focus:border-primary-fixed mb-4 resize-y"></textarea>
          </div>

          <div id="add-form-photo" class="hidden">
            <label class="block border-4 border-dashed border-outline-variant p-8 text-center cursor-pointer hover:border-on-background transition-colors mb-4">
              <span class="material-symbols-outlined text-4xl text-outline-variant block mb-2">photo_camera</span>
              <span class="font-headline font-bold text-sm uppercase tracking-widest text-outline">Take or choose a photo</span>
              <input id="draft-photo" type="file" accept="image/*" capture="environment" class="hidden" onchange="previewPhoto(this)" />
            </label>
            <div id="photo-preview" class="hidden mb-4">
              <img id="photo-preview-img" class="w-full border-4 border-on-background" />
            </div>
          </div>

          <button onclick="submitDraft()" class="w-full bg-primary-fixed text-on-background font-headline font-bold text-sm uppercase tracking-widest border-4 border-on-background px-4 py-3 neo-shadow hover:opacity-80 transition-opacity">
            Save Draft
          </button>
        </div>
      `;
    }

    window._activeAddTab = 'url';

    window.switchAddTab = function(tab) {
      window._activeAddTab = tab;
      ['url', 'text', 'photo'].forEach(t => {
        document.getElementById('add-form-' + t).classList.toggle('hidden', t !== tab);
        const btn = document.getElementById('tab-' + t);
        if (t === tab) {
          btn.classList.add('bg-on-background', 'text-surface-white');
          btn.classList.remove('bg-surface-white', 'text-on-background');
        } else {
          btn.classList.remove('bg-on-background', 'text-surface-white');
          btn.classList.add('bg-surface-white', 'text-on-background');
        }
      });
    };

    window.previewPhoto = function(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const maxW = 800;
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          const compressed = canvas.toDataURL('image/jpeg', 0.7);
          document.getElementById('photo-preview-img').src = compressed;
          document.getElementById('photo-preview').classList.remove('hidden');
          window._draftPhotoData = compressed;
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    };

    window.submitDraft = async function() {
      const tab = window._activeAddTab;
      let draft;
      if (tab === 'url') {
        const val = document.getElementById('draft-url').value.trim();
        if (!val) return alert('Paste a URL first');
        draft = { type: 'url', content: val };
      } else if (tab === 'text') {
        const val = document.getElementById('draft-text').value.trim();
        if (!val) return alert('Type or paste a recipe first');
        draft = { type: 'text', content: val };
      } else if (tab === 'photo') {
        if (!window._draftPhotoData) return alert('Take or choose a photo first');
        draft = { type: 'photo', content: window._draftPhotoData };
        window._draftPhotoData = null;
      }
      const result = await saveDraft(draft);
      if (result === 'offline') {
        alert('Saved locally (offline). Will sync when back online.');
      }
      location.hash = '#/';
    };

    // ─── Init ──────────────────────────────────────────────────────────────────

    window.addEventListener('hashchange', router);
    document.addEventListener('DOMContentLoaded', router);

    // --- PWA Service Worker ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
