<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2ff801" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Lab Kitchen</title>

  <!-- Tailwind CSS with plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Supabase JS client for draft sync -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Newsreader:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <!-- Tailwind config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-fixed': '#2ff801',
            'tertiary': '#0846ed',
            'on-background': '#2d2f2f',
            'background': '#f6f6f6',
            'surface-white': '#ffffff',
            'outline': '#757777',
            'outline-variant': '#acadad',
          },
          fontFamily: {
            headline: ['"Space Grotesk"', 'sans-serif'],
            body: ['"Newsreader"', 'serif'],
          },
          borderRadius: {
            DEFAULT: '0px',
            none: '0px',
            sm: '0px',
            md: '0px',
            lg: '0px',
            xl: '0px',
            '2xl': '0px',
            '3xl': '0px',
            full: '0px',
          },
        },
      },
    };
  </script>

  <style>
    * { border-radius: 0 !important; }

    .neo-shadow {
      box-shadow: 4px 4px 0px 0px #2d2f2f;
    }

    .scroll-fade {
      position: relative;
      overflow: hidden;
    }
    .scroll-fade::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 48px;
      background: linear-gradient(to right, transparent, #f6f6f6);
      pointer-events: none;
      z-index: 1;
    }
    .scroll-row {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-right: 48px;
    }
    .scroll-row::-webkit-scrollbar { display: none; }

    .hero-gradient {
      background: linear-gradient(to top, rgba(45, 47, 47, 0.85) 0%, rgba(45, 47, 47, 0.4) 50%, transparent 100%);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Recipe content markdown styles */
    .recipe-content h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 3px solid #2d2f2f;
      padding-bottom: 0.25rem;
      margin-top: 1.75rem;
      margin-bottom: 0.75rem;
    }

    .recipe-content h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
      color: #2d2f2f;
    }

    .recipe-content ul {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem 0;
    }

    .recipe-content li {
      font-family: 'Newsreader', serif;
      font-size: 1rem;
      line-height: 1.6;
      padding: 0.35rem 0;
      border-bottom: 1px solid #acadad;
    }

    .recipe-content li:last-child {
      border-bottom: none;
    }

    .recipe-content p {
      font-family: 'Newsreader', serif;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 0.85rem;
      color: #2d2f2f;
    }

    .recipe-content strong {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
    }

    .recipe-content ol {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem 0;
      counter-reset: step-counter;
    }

    .recipe-content ol li {
      counter-increment: step-counter;
      font-family: 'Newsreader', serif;
      font-size: 1rem;
      line-height: 1.7;
      padding: 0.5rem 0 0.5rem 2.5rem;
      border-bottom: 1px solid #acadad;
      position: relative;
    }

    .recipe-content ol li::before {
      content: counter(step-counter);
      position: absolute;
      left: 0;
      top: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      color: #2ff801;
      background: #2d2f2f;
      width: 1.75rem;
      height: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
  </style>
</head>

<body class="bg-background min-h-screen font-body text-on-background">

  <!-- Fixed Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-surface-white border-b-4 border-on-background">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <!-- Logo -->
      <a href="#/" class="flex items-center gap-2 no-underline">
        <span class="material-symbols-outlined text-primary-fixed text-3xl" style="font-variation-settings:'FILL' 1,'wght' 700;">biotech</span>
        <span class="font-headline font-black text-3xl uppercase italic tracking-tighter text-on-background leading-none">Lab Kitchen</span>
      </a>

      <div class="flex items-center gap-2">
        <button onclick="location.hash='#/add'" class="font-headline font-bold text-sm border-2 border-on-background w-8 h-8 flex items-center justify-center hover:bg-primary-fixed transition-colors">+</button>
        <a id="back-btn" href="#/" class="hidden font-headline font-bold text-sm uppercase tracking-widest border-2 border-on-background px-3 py-1 text-on-background no-underline hover:bg-on-background hover:text-surface-white transition-colors">
          &larr; Back
        </a>
      </div>
    </div>
  </header>

  <!-- Main content (offset for fixed header) -->
  <main class="pt-14 min-h-screen">
    <div id="app"></div>
  </main>

  <script>
    const REPO = 'mgregor-png/kitchen-lab';
    const BRANCH = 'main';
    const RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

    // ─── Tag pill helper ───────────────────────────────────────────────────────

    // Tag color system - categorized by meaning
    const TAG_CATEGORIES = {
      // Chef / source - black bg, green text
      chef:       { style: 'background:#2d2f2f; color:#2ff801;',
                    tags: ['ottolenghi', 'chatgpt', 'finn-tonry'] },
      // Meal type - green bg, black text
      meal:       { style: 'background:#2ff801; color:#000;',
                    tags: ['meal-prep', 'mains', 'sides', 'salad', 'bowls', 'dessert', 'soup', 'bread', 'pasta', 'grains', 'snack'] },
      // Cuisine - blue bg, white text
      cuisine:    { style: 'background:#0846ed; color:#fff;',
                    tags: ['middle-eastern', 'asian', 'mediterranean', 'mexican', 'italian', 'indian', 'thai', 'japanese', 'french'] },
      // Diet / nutrition - outline
      diet:       { style: 'background:transparent; color:#2d2f2f; border:1px solid #999;',
                    tags: ['high-protein', 'low-cal', 'vegan', 'vegetarian', 'gluten-free', 'dairy-free', 'keto'] },
      // Ingredient / protein - dark gray bg, white text
      ingredient: { style: 'background:#555; color:#fff;',
                    tags: ['chicken', 'meat', 'fish', 'vegetables', 'cheese', 'lamb', 'beef', 'pork', 'seafood', 'tofu', 'eggs'] },
      // Time descriptor - green outline
      time:       { style: 'background:transparent; color:#0f6b00; border:1px solid #2ff801;',
                    tags: ['quick', 'weekend', 'one-pot', 'no-cook'] },
    };

    function tagPillStyle(tag) {
      const t = tag.toLowerCase();
      for (const cat of Object.values(TAG_CATEGORIES)) {
        if (cat.tags.includes(t)) return cat.style;
      }
      // Default - outline
      return 'background:transparent; color:#2d2f2f; border:1px solid #ccc;';
    }

    function renderTagPill(tag, extraClass = '') {
      return `<span class="font-headline font-bold text-xs uppercase tracking-widest px-2 py-0.5 ${extraClass}" style="${tagPillStyle(tag)}">${tag}</span>`;
    }

    // ─── Frontmatter parser ────────────────────────────────────────────────────

    function parseFrontmatter(raw) {
      const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: raw };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const key = line.slice(0, idx).trim();
        const val = line.slice(idx + 1).trim();
        if (val.startsWith('[')) {
          try { meta[key] = JSON.parse(val); } catch { meta[key] = val; }
        } else {
          meta[key] = val.replace(/^["']|["']$/g, '');
        }
      });
      return { meta, body: match[2] };
    }

    // ─── Ingredient parser ─────────────────────────────────────────────────────

    function extractIngredients(body) {
      const match = body.match(/## Ingredients\n([\s\S]*?)(?=\n## |\n$|$)/);
      if (!match) return [];
      return match[1]
        .split('\n')
        .map(l => l.replace(/^[-*]\s*/, '').trim())
        .filter(Boolean);
    }

    function parseIngredient(str) {
      // Try to split "quantity unit name" or "name - quantity"
      const patterns = [
        /^([\d\/\s.,]+(?:g|kg|ml|l|tsp|tbsp|cup|cups|oz|lb|x|pcs|slice|slices|bunch|cloves?|cans?|tins?)\.?)\s+(.+)$/i,
        /^(.+?)\s*[-–]\s*([\d\/\s.,]+.*)$/,
      ];
      for (const re of patterns) {
        const m = str.match(re);
        if (m) return { quantity: m[1].trim(), name: m[2].trim() };
      }
      return { quantity: null, name: str };
    }

    function bodyWithoutIngredients(body) {
      return body.replace(/## Ingredients\n[\s\S]*?(?=\n## |$)/, '').trim();
    }

    // ─── Shopping list localStorage ────────────────────────────────────────────

    function shopKey(slug) { return `kitchen-lab-shop-${slug}`; }
    function loadChecked(slug) {
      try { return JSON.parse(localStorage.getItem(shopKey(slug)) || '[]'); } catch { return []; }
    }
    function saveChecked(slug, arr) {
      localStorage.setItem(shopKey(slug), JSON.stringify(arr));
    }

    // ─── Router ────────────────────────────────────────────────────────────────

    const backBtn = document.getElementById('back-btn');

    function router() {
      const hash = location.hash || '#/';
      const app = document.getElementById('app');

      const addMatch = hash === '#/add';
      const shopMatch = hash.match(/^#\/recipe\/([^/]+)\/shop$/);
      const cookMatch = hash.match(/^#\/recipe\/([^/]+)\/cook$/);
      const detailMatch = hash.match(/^#\/recipe\/([^/]+)$/);

      if (addMatch) {
        backBtn.href = '#/';
        backBtn.classList.remove('hidden');
        renderAddRecipe(app);
      } else if (cookMatch) {
        const slug = cookMatch[1];
        backBtn.href = `#/recipe/${slug}`;
        backBtn.classList.remove('hidden');
        renderCook(slug, app);
      } else if (shopMatch) {
        const slug = shopMatch[1];
        backBtn.href = `#/recipe/${slug}`;
        backBtn.classList.remove('hidden');
        renderShop(slug, app);
      } else if (detailMatch) {
        const slug = detailMatch[1];
        backBtn.href = '#/';
        backBtn.classList.remove('hidden');
        renderDetail(slug, app);
      } else {
        backBtn.classList.add('hidden');
        renderList(app);
      }
    }

    // ─── View: Recipe List ─────────────────────────────────────────────────────

    let allRecipes = null;
    let activeFilters = new Set();
    let activeTimeFilter = null; // null, 'quick', 'medium', 'long'
    let searchQuery = '';
    let activeCategoryCard = null; // null, 'speedy', 'one-pot', 'sunday'

    async function renderList(container) {
      container.innerHTML = '<div class="max-w-2xl mx-auto px-4 py-8 text-center font-headline">Loading...</div>';

      if (!allRecipes) {
        try {
          const res = await fetch(`${RAW}/recipes.json`);
          allRecipes = await res.json();
        } catch (e) {
          container.innerHTML = `<div class="max-w-2xl mx-auto px-4 py-8 text-center font-headline text-red-600">Failed to load recipes.</div>`;
          return;
        }
      }

      // Collect all unique tags
      const allTags = [];
      allRecipes.forEach(r => (r.tags || []).forEach(t => { if (!allTags.includes(t)) allTags.push(t); }));

      // Filter recipes by tags
      let filtered = activeFilters.size === 0
        ? [...allRecipes]
        : allRecipes.filter(r => (r.tags || []).some(t => activeFilters.has(t)));

      // Filter by time
      if (activeTimeFilter === 'quick') filtered = filtered.filter(r => r.time < 30);
      else if (activeTimeFilter === 'medium') filtered = filtered.filter(r => r.time >= 30 && r.time <= 60);
      else if (activeTimeFilter === 'long') filtered = filtered.filter(r => r.time > 60);

      // Filter by search query
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(r =>
          (r.title || '').toLowerCase().includes(q) ||
          (r.description || '').toLowerCase().includes(q) ||
          (r.ingredients || []).some(ing => ing.toLowerCase().includes(q))
        );
      }

      // Filter by category card
      if (activeCategoryCard === 'speedy') filtered = filtered.filter(r => r.time < 30);
      else if (activeCategoryCard === 'one-pot') filtered = filtered.filter(r => (r.tags || []).includes('one-pot'));
      else if (activeCategoryCard === 'sunday') filtered = filtered.filter(r => r.time > 60);

      const timeBtn = (label, value, icon) => `
        <button onclick="setTimeFilter('${value}')"
          class="font-headline font-bold text-xs uppercase tracking-widest px-3 py-1 border-2 transition-colors flex items-center gap-1 ${activeTimeFilter === value ? 'bg-primary-fixed text-on-background border-on-background' : 'bg-surface-white text-on-background border-outline-variant hover:border-on-background'}">
          <span class="material-symbols-outlined text-sm">${icon}</span>${label}
        </button>`;

      // Separate chef tags from other tags
      // Chef tags in preferred order
      const chefOrder = ['finn-tonry', 'chatgpt', 'ottolenghi'];
      const chefTags = chefOrder.filter(t => allTags.includes(t));
      // Non-chef tags: prioritized first, then the rest
      const priorityTags = ['quick', 'meal-prep', 'low-cal'];
      const otherTags = allTags.filter(t => !TAG_CATEGORIES.chef.tags.includes(t) && !priorityTags.includes(t));
      const nonChefTags = [...priorityTags.filter(t => allTags.includes(t)), ...otherTags];

      const filterBtn = (tag, isActive) => `
        <button
          onclick="toggleFilter('${tag}')"
          class="font-headline font-bold text-xs uppercase tracking-widest px-3 py-1 border-2 border-on-background transition-colors whitespace-nowrap flex-shrink-0 ${isActive ? 'bg-on-background text-surface-white' : 'bg-surface-white text-on-background hover:bg-on-background hover:text-surface-white'}"
        >${tag}</button>`;

      // Category card counts
      const speedyCount = allRecipes.filter(r => r.time < 30).length;
      const onePotCount = allRecipes.filter(r => (r.tags || []).includes('one-pot')).length;
      const sundayCount = allRecipes.filter(r => r.time > 60).length;

      const catCard = (id, icon, title, subtitle, count, accent) => {
        const isActive = activeCategoryCard === id;
        return `
          <button onclick="setCategoryCard('${id}')"
            class="w-full flex items-center gap-4 px-4 py-3 text-left transition-all"
            style="background:${isActive ? '#3a3c3c' : '#2d2f2f'}; border-left:3px solid ${accent};">
            <span class="material-symbols-outlined text-2xl" style="color:${accent}; font-variation-settings:'FILL' 1,'wght' 700;">${icon}</span>
            <div class="flex-1 min-w-0">
              <div class="font-headline font-black text-sm uppercase tracking-wider leading-tight" style="color:${accent};">${title}</div>
              <div class="font-body italic text-xs text-outline-variant">${subtitle}</div>
            </div>
            <div class="font-headline font-black text-2xl text-surface-white">${count}</div>
          </button>`;
      };

      const categoryCards = `
        <div class="flex flex-col gap-2 mb-3">
          ${catCard('speedy', 'bolt', 'Speedy', 'Under 30 minutes', speedyCount, '#2ff801')}
          ${catCard('one-pot', 'soup_kitchen', 'One-Pot Wonders', 'Minimal dishes, maximum flavour', onePotCount, '#0846ed')}
          ${catCard('sunday', 'local_fire_department', 'Sunday Projects', '60+ minutes of slow cooking', sundayCount, '#ffffff')}
        </div>
      `;

      const filterBar = `
        <div class="flex items-center gap-2 mb-3">
          <div class="flex gap-2 flex-1">
            <button onclick="setTimeFilter(null)"
              class="font-headline font-bold text-xs uppercase tracking-widest px-3 py-1 border-2 border-on-background transition-colors whitespace-nowrap ${!activeTimeFilter ? 'bg-on-background text-surface-white' : 'bg-surface-white text-on-background hover:bg-on-background hover:text-surface-white'}">Any</button>
            ${timeBtn('&lt;30', 'quick', 'bolt')}
            ${timeBtn('30-60', 'medium', 'schedule')}
            ${timeBtn('60+', 'long', 'local_fire_department')}
          </div>
          <button onclick="toggleSearchBar()" class="border-2 border-on-background w-10 h-10 flex items-center justify-center flex-shrink-0 hover:bg-primary-fixed transition-colors ${searchQuery ? 'bg-on-background text-surface-white' : 'bg-surface-white text-on-background'}">
            <span class="material-symbols-outlined text-xl">search</span>
          </button>
        </div>
        <div class="mb-3 ${searchQuery ? '' : 'hidden'}" id="search-bar-row">
          <div class="relative">
            <input
              id="search-input"
              type="text"
              value="${searchQuery.replace(/"/g, '&quot;')}"
              placeholder="Search recipes or ingredients..."
              oninput="handleSearch(this.value)"
              class="w-full font-headline text-sm bg-surface-white border-4 border-on-background px-4 py-3 pr-10 placeholder:text-outline-variant focus:outline-none focus:border-primary-fixed"
            />
            <button onclick="clearSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-background">
              <span class="material-symbols-outlined text-xl">close</span>
            </button>
          </div>
        </div>
        ${categoryCards}
        <div class="mb-2">
          <div class="scroll-fade">
            <div class="scroll-row">
              <button
                onclick="toggleFilter(null)"
                class="font-headline font-bold text-xs uppercase tracking-widest px-3 py-1 border-2 border-on-background transition-colors whitespace-nowrap flex-shrink-0 ${activeFilters.size === 0 ? 'bg-on-background text-surface-white' : 'bg-surface-white text-on-background hover:bg-on-background hover:text-surface-white'}"
              >ALL</button>
              ${chefTags.map(tag => filterBtn(tag, activeFilters.has(tag))).join('')}
            </div>
          </div>
        </div>
        <div class="mb-4">
          <div class="scroll-fade">
            <div class="scroll-row">
              ${nonChefTags.map(tag => filterBtn(tag, activeFilters.has(tag))).join('')}
            </div>
          </div>
        </div>
      `;

      const resultCount = `
        <div class="font-headline font-bold text-xs uppercase tracking-widest text-outline mb-4">
          ${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}${searchQuery ? ` matching "${searchQuery}"` : ''}
        </div>
      `;

      // Load ratings and sort: rated recipes first (highest to lowest), then unrated
      const ratings = await loadAllRatings();
      filtered.sort((a, b) => {
        const ra = ratings[a.slug] || 0;
        const rb = ratings[b.slug] || 0;
        if (ra && rb) return rb - ra; // both rated: highest first
        if (ra) return -1; // a rated, b not
        if (rb) return 1;  // b rated, a not
        return 0; // both unrated: keep original order
      });

      const cards = filtered.map(recipe => {
        const tags = (recipe.tags || []).map(t => renderTagPill(t, 'inline-block mt-1')).join(' ');
        const rating = ratings[recipe.slug];
        const ratingBadge = rating ? `<div class="font-headline font-black text-sm text-primary-fixed">${rating}</div>` : '';
        const imgHtml = recipe.image
          ? `<div class="w-20 h-20 md:w-24 md:h-24 flex-shrink-0 border-r-[3px] border-on-background overflow-hidden">
               <img src="${recipe.image}" alt="${recipe.title}" class="w-full h-full object-cover" loading="lazy" onerror="this.parentElement.style.display='none'">
             </div>`
          : '';
        return `
          <a href="#/recipe/${recipe.slug}" class="block border-4 border-on-background bg-surface-white neo-shadow mb-4 no-underline text-on-background hover:translate-x-[-2px] hover:translate-y-[-2px] transition-transform overflow-hidden">
            <div class="flex items-stretch">
              ${imgHtml}
              <div class="flex-1 p-4 flex items-start justify-between gap-4 min-w-0">
                <div class="flex-1 min-w-0">
                  <div class="font-headline font-black text-xl uppercase leading-tight mb-1">${recipe.title}</div>
                  <div class="font-body italic text-sm text-outline mb-2">${recipe.description || ''}</div>
                  <div class="flex flex-wrap gap-1">${tags}</div>
                </div>
                <div class="border-l-[3px] border-on-background pl-3 min-w-[60px] text-right flex-shrink-0">
                  ${ratingBadge}
                  <div class="font-headline font-black text-3xl leading-none">${recipe.time}</div>
                  <div class="font-headline font-bold text-[10px] uppercase tracking-widest">MIN</div>
                </div>
              </div>
            </div>
          </a>
        `;
      }).join('');

      container.innerHTML = `
        <div class="max-w-2xl mx-auto px-4 py-8">
          ${filterBar}
          ${await renderWeeklySection()}
          ${await renderDraftsSection()}
          ${resultCount}
          ${filtered.length === 0 ? '<div class="font-headline text-outline text-center py-8">No recipes match.</div>' : cards}
        </div>
      `;
    }

    window.toggleFilter = function(tag) {
      if (tag === null) {
        activeFilters.clear();
      } else {
        if (activeFilters.has(tag)) activeFilters.delete(tag);
        else activeFilters.add(tag);
      }
      renderList(document.getElementById('app'));
    };

    window.setTimeFilter = function(value) {
      activeTimeFilter = activeTimeFilter === value ? null : value;
      renderList(document.getElementById('app'));
    };

    let _searchTimeout = null;
    window.handleSearch = function(value) {
      clearTimeout(_searchTimeout);
      _searchTimeout = setTimeout(() => {
        searchQuery = value;
        renderList(document.getElementById('app'));
        // Restore focus and cursor position after re-render
        const input = document.getElementById('search-input');
        if (input) {

    // ─── View: Cook Mode ──────────────────────────────────────────────────────

    let cookState = { steps: [], current: 0, timers: [], ingredients: [], ingredientNames: [] };

    async function renderCook(slug, container) {
      container.innerHTML = '<div class="min-h-screen bg-on-background flex items-center justify-center"><div class="font-headline text-primary-fixed">Loading cook mode...</div></div>';

      if (!allRecipes) {
        try {
          const listRes = await fetch(`${RAW}/recipes.json`);
          allRecipes = await listRes.json();
        } catch {}
      }

      let raw;
      try {
        const res = await fetch(`${RAW}/recipes/${slug}.md`);
        if (!res.ok) throw new Error('Not found');
        raw = await res.text();
      } catch {
        container.innerHTML = '<div class="min-h-screen bg-on-background flex items-center justify-center"><div class="font-headline text-surface-white">Recipe not found.</div></div>';
        return;
      }

      const { meta, body } = parseFrontmatter(raw);
      const title = meta.title || slug;
      const ingredients = extractIngredients(body);
      const ingredientNames = ingredients.map(ing => parseIngredient(ing).name.toLowerCase());

      const mainBody = bodyWithoutIngredients(body);
      const renderedHtml = marked.parse(mainBody);
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = renderedHtml;

      let steps = [];
      const ol = tempDiv.querySelector('ol');
      if (ol) {
        steps = Array.from(ol.querySelectorAll('li')).map(li => li.innerHTML.trim());
      } else {
        steps = Array.from(tempDiv.querySelectorAll('p'))
          .map(p => p.innerHTML.trim())
          .filter(t => t.length > 20);
      }

      if (steps.length === 0) {
        container.innerHTML = '<div class="min-h-screen bg-on-background flex items-center justify-center"><div class="font-headline text-surface-white">No method steps found.</div></div>';
        return;
      }

      cookState = { steps, current: 0, timers: [], ingredients, ingredientNames };
      renderCookStep(slug, title, container);

      const keyHandler = (e) => {
        if (e.key === 'ArrowRight') { navigateCook(slug, title, container, 1); }
        else if (e.key === 'ArrowLeft') { navigateCook(slug, title, container, -1); }
      };
      document.addEventListener('keydown', keyHandler);

      let touchStartX = 0;
      const touchStart = (e) => { touchStartX = e.touches[0].clientX; };
      const touchEnd = (e) => {
        const delta = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(delta) > 50) {
          navigateCook(slug, title, container, delta < 0 ? 1 : -1);
        }
      };
      container.addEventListener('touchstart', touchStart, { passive: true });
      container.addEventListener('touchend', touchEnd, { passive: true });

      const cleanup = () => {
        document.removeEventListener('keydown', keyHandler);
        container.removeEventListener('touchstart', touchStart);
        container.removeEventListener('touchend', touchEnd);
        cookState.timers.forEach(t => clearInterval(t.interval));
        cookState.timers = [];
        window.removeEventListener('hashchange', cleanup);
      };
      window.addEventListener('hashchange', cleanup);
    }

    function navigateCook(slug, title, container, direction) {
      const newStep = cookState.current + direction;
      if (newStep < 0) return;
      if (newStep >= cookState.steps.length) {
        location.hash = `#/recipe/${slug}`;
        return;
      }
      cookState.current = newStep;
      renderCookStep(slug, title, container);
    }

    const TIMER_RE = /(\d+)[\s-]*(minutes?|mins?|seconds?|secs?|hours?|hrs?)/gi;

    function parseTimers(stepHtml) {
      const timers = [];
      let match;
      const re = new RegExp(TIMER_RE.source, TIMER_RE.flags);
      while ((match = re.exec(stepHtml)) !== null) {
        const value = parseInt(match[1]);
        const unit = match[2].toLowerCase();
        let seconds;
        if (unit.startsWith('h')) seconds = value * 3600;
        else if (unit.startsWith('s')) seconds = value;
        else seconds = value * 60;
        timers.push({ text: match[0], seconds, id: `timer-${Date.now()}-${timers.length}` });
      }
      return timers;
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function renderCookStep(slug, title, container) {
      const { steps, current, ingredients, ingredientNames } = cookState;
      const stepHtml = steps[current];
      const total = steps.length;
      const progress = ((current + 1) / total) * 100;

      const timers = parseTimers(stepHtml);
      let displayHtml = stepHtml.replace(new RegExp(TIMER_RE.source, TIMER_RE.flags), '<span style="color:#2ff801; font-weight:700;">$&</span>');

      const timerCallouts = timers.map(t => `
        <button onclick="startCookTimer('${t.id}', ${t.seconds})" id="btn-${t.id}" class="flex items-center gap-3 mt-4 px-4 py-3" style="border:3px solid #2ff801;">
          <span class="material-symbols-outlined text-xl" style="color:#2ff801; font-variation-settings:'FILL' 1;">timer</span>
          <span id="display-${t.id}" class="font-headline font-black text-lg" style="color:#2ff801;">${formatTime(t.seconds)}</span>
          <span class="font-headline font-bold text-xs uppercase tracking-widest text-outline-variant">TAP TO START</span>
        </button>
      `).join('');

      const activeTimerPills = cookState.timers
        .filter(t => t.remaining > 0)
        .map(t => `
          <div class="flex items-center gap-2 px-3 py-1" style="background:#1a1a1a; border:2px solid #2ff801;">
            <span class="material-symbols-outlined text-sm" style="color:#2ff801;">timer</span>
            <span id="pill-${t.id}" class="font-headline font-bold text-xs" style="color:#2ff801;">${formatTime(t.remaining)}</span>
          </div>
        `).join('');

      const stepTextLower = stepHtml.toLowerCase();
      const ingRows = ingredients.map((ing, i) => {
        const { quantity, name } = parseIngredient(ing);
        const mentioned = ingredientNames[i] && stepTextLower.includes(ingredientNames[i]);
        return `
          <div class="flex items-start justify-between gap-2 py-2 border-b border-opacity-30 last:border-b-0" style="border-color:#444;">
            <span class="font-body italic text-sm leading-snug flex-1" style="color:${mentioned ? '#fff' : '#999'}; ${mentioned ? 'font-weight:600;' : ''}">${name}</span>
            ${quantity ? `<span class="font-headline font-bold text-sm flex-shrink-0" style="color:${mentioned ? '#2ff801' : '#777'};">${quantity}</span>` : ''}
          </div>
        `;
      }).join('');

      const safeTitle = title.replace(/'/g, "\\'");

      container.innerHTML = `
        <div class="h-[calc(100vh-3.5rem)] bg-on-background text-surface-white md:grid md:grid-cols-12 overflow-hidden">
          ${ingredients.length > 0 ? `
          <div class="hidden md:block md:col-span-4 p-6 border-r-4 h-full overflow-y-auto" style="background:#1a1a1a; border-color:#444;">
            <div class="font-headline font-black text-xs uppercase tracking-widest text-primary-fixed mb-4">Ingredients</div>
            ${ingRows}
          </div>
          ` : ''}

          <div class="${ingredients.length > 0 ? 'md:col-span-8' : 'md:col-span-12'} flex flex-col h-[calc(100vh-3.5rem)] overflow-hidden">
            <!-- Top bar -->
            <div class="flex items-center justify-between px-4 md:px-6 pt-4 pb-2 flex-shrink-0">
              <div class="font-headline font-black text-xs uppercase tracking-widest text-primary-fixed">Cook Mode</div>
              ${activeTimerPills ? `<div class="flex gap-2">${activeTimerPills}</div>` : ''}
              <div class="flex items-center gap-3">
                <div class="font-headline font-bold text-[10px] md:text-xs uppercase tracking-widest text-outline">${current + 1}/${total}</div>
                <a href="#/recipe/${slug}" class="text-outline hover:text-surface-white">
                  <span class="material-symbols-outlined text-xl">close</span>
                </a>
              </div>
            </div>

            <!-- Progress bar -->
            <div class="h-1 mx-4 md:mx-6 flex-shrink-0" style="background:#444;">
              <div class="h-1 transition-all" style="background:#2ff801; width:${progress}%;"></div>
            </div>

            <!-- Mobile ingredients toggle -->
            ${ingredients.length > 0 ? `
            <div class="md:hidden flex-shrink-0">
              <button
                onclick="document.getElementById('cook-mobile-ings').classList.toggle('hidden'); this.querySelector('.expand-icon').textContent = document.getElementById('cook-mobile-ings').classList.contains('hidden') ? 'expand_more' : 'expand_less';"
                class="w-full flex items-center justify-between px-4 py-2 text-left" style="background:#1a1a1a; border-bottom:2px solid #444;">
                <span class="font-headline font-bold text-[10px] uppercase tracking-widest text-primary-fixed">Ingredients (${ingredients.length})</span>
                <span class="expand-icon material-symbols-outlined text-sm text-primary-fixed">expand_more</span>
              </button>
              <div id="cook-mobile-ings" class="hidden px-4 pb-3 max-h-48 overflow-y-auto" style="background:#1a1a1a;">
                ${ingRows}
              </div>
            </div>
            ` : ''}

            <!-- Step content - scrollable if needed -->
            <div class="flex-1 overflow-y-auto px-4 md:px-12 py-6">
              <div class="font-body text-lg md:text-2xl leading-relaxed" style="line-height:1.7;">
                ${displayHtml}
              </div>
              ${timerCallouts}
            </div>

            <!-- Bottom nav - always pinned -->
            <div class="flex items-center justify-between px-4 md:px-6 py-4 flex-shrink-0 border-t-2" style="border-color:#444;">
              ${current > 0 ? `
                <button onclick="navigateCook('${slug}', '${safeTitle}', document.getElementById('app'), -1)" class="font-headline font-bold text-sm uppercase tracking-widest text-outline hover:text-surface-white">
                  &larr; Prev
                </button>
              ` : '<div></div>'}
              <button onclick="navigateCook('${slug}', '${safeTitle}', document.getElementById('app'), 1)" class="bg-primary-fixed text-on-background font-headline font-bold text-sm uppercase tracking-widest border-4 border-black px-6 py-3 neo-shadow">
                ${current === total - 1 ? 'Done' : 'Next Step'} &rarr;
              </button>
            </div>
          </div>
        </div>
      `;
    }

    window.startCookTimer = function(id, totalSeconds) {
      const existing = cookState.timers.find(t => t.id === id);
      if (existing) return;

      const timer = { id, remaining: totalSeconds, interval: null };
      timer.interval = setInterval(() => {
        timer.remaining--;
        const display = document.getElementById(`display-${id}`);
        if (display) display.textContent = formatTime(timer.remaining);
        const pill = document.getElementById(`pill-${id}`);
        if (pill) pill.textContent = formatTime(timer.remaining);

        if (timer.remaining <= 0) {
          clearInterval(timer.interval);
          if (display) {
            display.textContent = 'DONE!';
            display.style.animation = 'pulse 1s infinite';
          }
          if (pill) {
            pill.textContent = 'DONE!';
            pill.style.animation = 'pulse 1s infinite';
          }
        }
      }, 1000);

      cookState.timers.push(timer);

      const btn = document.getElementById(`btn-${id}`);
      if (btn) {
        const label = btn.querySelector('.text-outline-variant');
        if (label) label.textContent = 'RUNNING';
      }
    };

    window.navigateCook = navigateCook;

    // --- Shopping rules engine ---

    const PANTRY_STAPLES = [
      'olive oil', 'salt', 'pepper', 'black pepper', 'sea salt',
      'paprika', 'cumin', 'oregano', 'chili', 'chilli', 'chili powder',
      'garlic', 'dried spices', 'flaky sea salt', 'kosher salt',
      'ground cumin', 'ground coriander', 'ground cinnamon', 'ground turmeric',
      'vegetable oil', 'sunflower oil', 'neutral oil', 'rapeseed oil',
    ];

    const MAKE_AT_HOME = [
      'pickled red onion', 'pickled red onions', 'pickled onion', 'pickled onions',
      'pickled vegetables', 'quick-pickled',
    ];

    const SPICE_MIX_BREAKDOWNS = {
      'taco seasoning': ['cumin', 'chili powder', 'paprika', 'garlic powder', 'onion powder', 'oregano'],
      'gyros seasoning': ['paprika', 'cumin', 'oregano', 'garlic powder', 'onion powder', 'coriander'],
      'fajita seasoning': ['cumin', 'paprika', 'chili powder', 'garlic powder', 'onion powder', 'oregano'],
    };

    function classifyIngredient(ingredientStr) {
      const lower = ingredientStr.toLowerCase();
      for (const term of MAKE_AT_HOME) {
        if (lower.includes(term)) return { category: 'make-at-home', label: 'MAKE AT HOME' };
      }
      for (const [mix, components] of Object.entries(SPICE_MIX_BREAKDOWNS)) {
        if (lower.includes(mix)) return { category: 'spice-mix', label: mix.toUpperCase(), components };
      }

    async function loadDrafts() {
      try {
        // Try Supabase first - only pending, processing, and failed drafts
        const { data, error } = await sb.from('drafts').select('*').in('status', ['pending', 'processing', 'failed']).order('created_at', { ascending: true });
        if (error) throw error;
        const remote = (data || []).map(d => ({ ...d, createdAt: d.created_at, source: 'remote' }));
        const local = loadLocalDrafts().map(d => ({ ...d, source: 'offline', status: 'pending' }));
        return [...local, ...remote];
      } catch {
        return loadLocalDrafts().map(d => ({ ...d, source: 'offline', status: 'pending' }));
      }
    }

    async function saveDraft(draft) {
      try {
        const { error } = await sb.from('drafts').insert({ type: draft.type, content: draft.content });
        if (error) throw error;
        // If we have offline drafts, try to sync them too
        await syncOfflineDrafts();
      } catch {
        // Offline fallback - save to localStorage
        const drafts = loadLocalDrafts();
        drafts.push({ ...draft, id: Date.now(), createdAt: new Date().toISOString() });
        localStorage.setItem(DRAFTS_LOCAL_KEY, JSON.stringify(drafts));
        return 'offline';
      }
    }

    async function deleteDraft(id) {
      try {
        // UUID = Supabase, number = local
        if (typeof id === 'string' && id.includes('-')) {
          const { error } = await sb.from('drafts').delete().eq('id', id);
          if (error) throw error;
        } else {
          const drafts = loadLocalDrafts().filter(d => d.id !== id);
          localStorage.setItem(DRAFTS_LOCAL_KEY, JSON.stringify(drafts));
        }
      } catch {
        // Silently fail - draft stays, user can retry
      }
    }

    function loadLocalDrafts() {
      try { return JSON.parse(localStorage.getItem(DRAFTS_LOCAL_KEY) || '[]'); } catch { return []; }
    }

    async function syncOfflineDrafts() {
      const local = loadLocalDrafts();
      if (local.length === 0) return;
      const synced = [];
      for (const d of local) {
        try {
          const { error } = await sb.from('drafts').insert({ type: d.type, content: d.content });
          if (!error) synced.push(d.id);
        } catch { /* skip, will retry next time */ }
      }
      if (synced.length > 0) {
        const remaining = local.filter(d => !synced.includes(d.id));
        localStorage.setItem(DRAFTS_LOCAL_KEY, JSON.stringify(remaining));
      }
    }

    function compressImage(file, maxWidth, quality) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const scale = Math.min(1, maxWidth / img.width);
            const canvas = document.createElement('canvas');
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    window.previewThumbnail = async function(input) {
      const file = input.files[0];
      if (!file) return;
      const compressed = await compressImage(file, 400, 0.7);
      window._draftThumbnail = compressed;
      document.getElementById('thumbnail-preview-img').src = compressed;
      document.getElementById('thumbnail-preview').classList.remove('hidden');
    };

    window.clearThumbnail = function() {
      window._draftThumbnail = null;
      document.getElementById('thumbnail-preview').classList.add('hidden');
      document.getElementById('draft-thumbnail').value = '';
    };

    window.addScreenshots = async function(input) {
      const files = Array.from(input.files);
      if (!files.length) return;
      for (const file of files) {
        const compressed = await compressImage(file, 1200, 0.8);
        window._draftScreenshots.push(compressed);
      }
      renderScreenshotPreviews();
      input.value = '';
    };

    function renderScreenshotPreviews() {
      const container = document.getElementById('screenshots-preview');
      if (!container) return;
      container.innerHTML = window._draftScreenshots.map((src, i) => `
        <div class="relative">
          <img src="${src}" class="w-24 h-24 object-cover border-4 border-on-background" />
          <button onclick="removeScreenshot(${i})" class="absolute -top-2 -right-2 w-6 h-6 bg-on-background text-surface-white flex items-center justify-center text-xs font-bold">X</button>
        </div>
      `).join('');
    }

    window.removeScreenshot = function(index) {
      window._draftScreenshots.splice(index, 1);
      renderScreenshotPreviews();
    };

    window.submitDraft = async function() {
      const tab = window._activeAddTab;
      let content = {};

      if (tab === 'url') {
        const val = document.getElementById('draft-url').value.trim();
        if (!val) return alert('Paste a URL first');
        content.source = { type: 'url', value: val };
      } else if (tab === 'text') {
        const val = document.getElementById('draft-text').value.trim();
        if (!val) return alert('Type or paste a recipe first');
        content.source = { type: 'text', value: val };
      }

      if (window._draftThumbnail) {
        content.thumbnail = window._draftThumbnail;
      }
      if (window._draftScreenshots.length > 0) {
        content.screenshots = window._draftScreenshots;
      }

      if (!content.source && !content.screenshots?.length) {
        return alert('Add a URL, text, or at least one screenshot');
      }

      // Save as type based on what's provided
      const type = content.screenshots?.length ? 'photo' : (content.source?.type || 'text');
      const draft = { type, content: JSON.stringify(content) };

      const result = await saveDraft(draft);
      if (result === 'offline') {
        alert('Saved locally (offline). Will sync when back online.');
      }

      // Reset state
      window._draftThumbnail = null;
      window._draftScreenshots = [];
      location.hash = '#/';
    };

    // ─── Init ──────────────────────────────────────────────────────────────────

    window.addEventListener('hashchange', router);
    document.addEventListener('DOMContentLoaded', router);

    // --- PWA Service Worker ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
